name: Monitoring Stack Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select operation"
        required: true
        default: create
        type: choice
        options:
          - create
          - delete
          - upgrade
          - restart

permissions:
  contents: read

jobs:

  monitoring:

    runs-on: self-hosted

    env:
      NAMESPACE: monitoring

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Verify Kubernetes Cluster
      run: |
        kubectl get nodes

    - name: Add Helm Repositories
      if: github.event.inputs.action == 'create' || github.event.inputs.action == 'upgrade'
      run: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts

        helm repo add grafana https://grafana.github.io/helm-charts

        helm repo update

    ###########################################################
    # CREATE
    ###########################################################

    - name: Create Monitoring Namespace
      if: github.event.inputs.action == 'create'
      run: |
        kubectl create namespace $NAMESPACE \
        --dry-run=client -o yaml | kubectl apply -f -

    - name: Cleanup Failed Loki Resources
      if: github.event.inputs.action == 'create'
      run: |
        helm uninstall loki -n $NAMESPACE || true

        kubectl delete pvc --all -n $NAMESPACE || true

        kubectl delete secret -n $NAMESPACE $(kubectl get secret -n $NAMESPACE | grep loki | awk '{print $1}') || true

    - name: Install Prometheus Stack
      if: github.event.inputs.action == 'create'
      run: |
        helm upgrade --install prometheus \
        prometheus-community/kube-prometheus-stack \
        --namespace $NAMESPACE \
        -f helm-values/prometheus-values.yaml \
        --wait --timeout 10m --atomic

    - name: Install Loki
      if: github.event.inputs.action == 'create'
      run: |
        helm upgrade --install loki \
        grafana/loki \
        --version 5.41.4 \
        --namespace $NAMESPACE \
        -f helm-values/loki-values.yaml \
        --wait --timeout 10m --atomic

    - name: Install Alloy
      if: github.event.inputs.action == 'create'
      run: |
        helm upgrade --install alloy \
        grafana/alloy \
        --namespace $NAMESPACE \
        -f helm-values/alloy-values.yaml \
        --wait --timeout 10m --atomic

    - name: Deploy Test Nginx Application
      if: github.event.inputs.action == 'create'
      run: |
        kubectl apply -f manifests/nginx.yaml

    ###########################################################
    # UPGRADE
    ###########################################################

    - name: Upgrade Prometheus Stack
      if: github.event.inputs.action == 'upgrade'
      run: |
        helm upgrade --install prometheus \
        prometheus-community/kube-prometheus-stack \
        --namespace $NAMESPACE \
        -f helm-values/prometheus-values.yaml \
        --wait --timeout 10m --atomic

    - name: Upgrade Loki
      if: github.event.inputs.action == 'upgrade'
      run: |
        helm upgrade --install loki \
        grafana/loki \
        --version 5.41.4 \
        --namespace $NAMESPACE \
        -f helm-values/loki-values.yaml \
        --wait --timeout 10m --atomic

    - name: Upgrade Alloy
      if: github.event.inputs.action == 'upgrade'
      run: |
        helm upgrade --install alloy \
        grafana/alloy \
        --namespace $NAMESPACE \
        -f helm-values/alloy-values.yaml \
        --wait --timeout 10m --atomic

    ###########################################################
    # RESTART
    ###########################################################

    - name: Restart Monitoring Components
      if: github.event.inputs.action == 'restart'
      run: |
        kubectl rollout restart deployment -n $NAMESPACE || true

        kubectl rollout restart statefulset -n $NAMESPACE || true

    ###########################################################
    # DELETE
    ###########################################################

    - name: Delete Alloy
      if: github.event.inputs.action == 'delete'
      run: |
        helm uninstall alloy -n $NAMESPACE || true

    - name: Delete Loki
      if: github.event.inputs.action == 'delete'
      run: |
        helm uninstall loki -n $NAMESPACE || true

    - name: Delete Prometheus Stack
      if: github.event.inputs.action == 'delete'
      run: |
        helm uninstall prometheus -n $NAMESPACE || true

    - name: Delete PVCs
      if: github.event.inputs.action == 'delete'
      run: |
        kubectl delete pvc --all -n $NAMESPACE || true

    - name: Delete Test Application
      if: github.event.inputs.action == 'delete'
      run: |
        kubectl delete -f manifests/nginx.yaml --ignore-not-found=true

    - name: Delete Monitoring Namespace
      if: github.event.inputs.action == 'delete'
      run: |
        kubectl delete namespace $NAMESPACE --ignore-not-found=true

    ###########################################################
    # VERIFY
    ###########################################################

    - name: Verify Resources
      run: |
        kubectl get pods -A

        kubectl get pvc -A

        kubectl get svc -A
