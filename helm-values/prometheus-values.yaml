grafana:
  enabled: true

  adminUser: admin

  adminPassword: admin123

  service:
    type: NodePort

prometheus:
  prometheusSpec:

    retention: 7d

    storageSpec:
      volumeClaimTemplate:
        spec:

          accessModes:
            - ReadWriteOnce

          resources:
            requests:
              storage: 5Gi

alertmanager:
  enabled: true